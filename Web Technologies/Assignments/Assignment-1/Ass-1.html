<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignment - 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            background-color: #ffffff;
            width: 60%;
            margin: 30px auto;
            padding: 20px;
            border-radius: 8px;
        }

        input {
            padding: 6px;
            width: 250px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 1. Largest heading -->
    <h1>Welcome</h1>

    <!-- 2. Second highest heading -->
    <h2>About Us</h2>

    <!-- 3. Third highest heading aligned to center -->
    <h3 style="text-align: center;">Welcome To HTML</h3>

    <!-- 4. Heading with custom text color -->
    <h4 style="color: #0066cc;">Services</h4>

    <!-- 5. Underlined heading with red color -->
    <h4 style="color: #ff0000; text-decoration: underline;">Important</h4>

    <!-- 6. Text input for user's name -->
    <input type="text" placeholder="Enter your name">

    <br><br>

    <!-- 7. Password input with placeholder -->
    <input type="password" placeholder="Enter your password">

    <br><br>

    <!-- 8. Checkbox with label -->
    <input type="checkbox" id="agree">
    <label for="agree">I Agree</label>

    <br><br>

    <!-- 9. Embedded audio with controls -->
    <audio controls>
        <source src="C:\Users\athishmu\Downloads\apple-ring-1280.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <br><br>

    <!-- 10. Unordered list -->
    <ul>
        <li>Red</li>
        <li>Blue</li>
    </ul>

</div>

</body>
</html>
